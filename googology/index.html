<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大数阶梯 — Googology Scale</title>
    <link rel="stylesheet" href="lib/katex/katex.min.css">
    <link rel="stylesheet" href="lib/atom-one-dark.min.css">
    <link rel="stylesheet" href="styles.css?v=20260724-latex">
    <script src="lib/highlight.min.js"></script>
</head>
<body>
    <main
        id="app"
        aria-label="Googology Scale"
        data-i18n-aria-label="ui.title"
    >
        <div id="ruler-container"></div>
        <svg id="svg-layer" aria-hidden="true"></svg>
        <div id="ticks-container" aria-hidden="true"></div>
        <div id="items-container"></div>
    </main>

    <div id="detail-modal" class="modal-overlay" aria-hidden="true" hidden>
        <div
            class="modal-content"
            role="dialog"
            aria-modal="true"
            aria-label="内容详情"
        >
            <button
                class="modal-close"
                type="button"
                aria-label="关闭详情"
            >&times;</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <header id="ui-overlay">
        <h1 data-i18n="ui.title">Googology Scale</h1>
        <label id="language-control" for="language-select">
            <span data-i18n="ui.language">语言</span>
            <select id="language-select"></select>
        </label>
    </header>

    <section
        id="filter-controls"
        aria-label="内容筛选"
        data-i18n-aria-label="ui.filters.label"
    >
        <button
            id="btn-show-all"
            type="button"
            class="active"
            data-filter="all"
            aria-pressed="true"
        >
            <span data-i18n="ui.filters.all">显示全部</span>
        </button>
        <button
            id="btn-show-info"
            type="button"
            data-filter="info"
            aria-pressed="false"
        >
            <span class="btn-icon info" aria-hidden="true"></span>
            <span data-i18n="ui.filters.info">只显示有说明的条目</span>
        </button>
        <button
            id="btn-show-code"
            type="button"
            data-filter="code"
            aria-pressed="false"
        >
            <span class="btn-icon code" aria-hidden="true"></span>
            <span data-i18n="ui.filters.code">只显示有代码的条目</span>
        </button>
        <div class="filter-separator" aria-hidden="true"></div>
        <label>
            <input type="checkbox" id="check-zoom-level" checked>
            <span data-i18n="ui.filters.zoomVisibility">
                根据缩放自动隐藏
            </span>
        </label>
        <div id="zoom-manual-control" class="zoom-manual-control" hidden>
            <div id="zoom-manual-label" class="zoom-manual-header">
                显示层级：0（0–3）
            </div>
            <input
                class="zoom-slider"
                type="range"
                id="zoom-slider"
                min="0"
                max="3"
                step="1"
                value="0"
            >
            <div class="zoom-scale-labels" aria-hidden="true">
                <span>0</span><span>1</span><span>2</span><span>3</span>
            </div>
        </div>
    </section>

    <section
        id="controls"
        aria-label="视图控制"
        data-i18n-aria-label="ui.view.label"
    >
        <div class="zoom-info">
            <span data-i18n="ui.view.zoom">缩放倍率：</span>
            <span id="zoom-level">1.0</span>x
        </div>
        <div class="hint controls-hint" data-i18n="ui.view.hint">
            滚轮缩放 / 拖拽移动
        </div>
        <div class="control-buttons">
            <button
                type="button"
                class="control-button control-button-reset"
                data-action="reset"
            >
                <span data-i18n="ui.view.reset">回到起点</span>
            </button>
            <button
                type="button"
                class="control-button"
                data-zoom-factor="1.2"
                aria-label="放大"
                data-i18n-aria-label="ui.view.zoomIn"
            >+</button>
            <button
                type="button"
                class="control-button"
                data-zoom-factor="0.8"
                aria-label="缩小"
                data-i18n-aria-label="ui.view.zoomOut"
            >−</button>
        </div>
    </section>

    <script src="lib/katex/katex.min.js"></script>
    <script src="lib/katex/contrib/auto-render.min.js"></script>
    <script src="math-renderer.js?v=20260724-latex"></script>
    <script src="i18n.js?v=20260724-latex"></script>
    <script src="content-document.js?v=20260724-latex"></script>
    <script src="items.js?v=20260724-latex"></script>
    <script src="axis_items.js?v=20260724-latex"></script>
    <script src="locales/zh-CN/interface.js?v=20260724-latex"></script>
    <script src="locales/zh-CN/items-000-040.js?v=20260724-latex"></script>
    <script src="locales/zh-CN/items-041-081.js?v=20260724-latex"></script>
    <script src="locales/zh-CN/items-082-122.js?v=20260724-latex"></script>
    <script src="locales/en/interface.js?v=20260724-latex"></script>
    <script src="locales/en/items-000-040.js?v=20260724-latex"></script>
    <script src="locales/en/items-041-081.js?v=20260724-latex"></script>
    <script src="locales/en/items-082-122.js?v=20260724-latex"></script>
    <script src="scale-core.js?v=20260724-latex"></script>
    <script src="modal.js?v=20260724-latex"></script>
    <script src="scale-renderer.js?v=20260724-latex"></script>
    <script src="app.js?v=20260724-latex"></script>
</body>
</html>
